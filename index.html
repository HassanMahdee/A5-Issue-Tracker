<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- DaisuUI & Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- Google Font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section
      id="login-page"
      class="hidden bg-base-200 py-4"
    >
      <div
        id="login-container"
        class="flex flex-col justify-center items-center gap-2 w-11/12 max-w-sm bg-base-100 p-6 rounded-lg shadow-md mx-auto"
      >
        <div
          id=" login-header"
          class="flex flex-col justify-center items-center gap-1"
        >
          <img class="my-4" src="./assets/github-logo.png" alt="GitHub Logo" />
          <h1 class="text-2xl font-bold">GitHub Issue Tracker</h1>
          <p class="text-sm text-base-content/50">Sign in to manage your issues</p>
        </div>
        <div id="login-body" class="w-full">
          <fieldset class="fieldset">
            <div class="space-y-1">
              <label class="label text-sm font-medium text-neutral"
                >Username</label
              >
              <input
                type="text"
                class="input w-full"
                placeholder="Enter your username"
              />
              <p class="text-xs text-primary">Default: admin</p>
            </div>
            <div class="space-y-1">
              <label class="label text-sm font-medium text-neutral"
                >Password</label
              >
              <input
                type="password"
                class="input w-full"
                placeholder="Enter your password"
              />
              <p class="text-xs text-primary">Default: admin123</p>
            </div>
            <button class="btn btn-primary mt-4">Sign In</button>
          </fieldset>
        </div>
        <div id="login-footer" class="w-full flex flex-col gap-2">
          <div class="flex items-center gap-2 w-full">
            <div class="flex-1 h-px bg-gray-400"></div>
            <p class="text-xs font-medium">OR</p>
            <div class="flex-1 h-px bg-gray-400"></div>
          </div>
          <p class="text-xs text-center font-light text-base-content/60">
            Demo Credentials:
          </p>
          <div class="flex flex-col gap-1 w-full bg-base-200 p-9 rounded-lg">
            <p class="text-xs text-center font-normal">
              <strong>Username</strong>: admin
            </p>
            <p class="text-xs text-center font-normal">
              <strong>Password</strong>: admin123
            </p>
          </div>
        </div>
      </div>
    </section>
    <section id="main-page">
      <h1>Main Page</h1>
    </section>
  </body>
</html>
