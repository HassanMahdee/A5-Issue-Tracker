<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <section id="login-page" class="bg-base-200 py-4">
      <div
        id="login-container"
        class="flex flex-col justify-center items-center gap-2 w-11/12 max-w-sm bg-base-100 p-6 rounded-lg shadow-md mx-auto"
      >
        <div
          id=" login-header"
          class="flex flex-col justify-center items-center gap-1"
        >
          <img class="my-4" src="./assets/github-logo.png" alt="GitHub Logo" />
          <h1 class="text-2xl font-bold">GitHub Issue Tracker</h1>
          <p class="text-sm text-base-content/50">
            Sign in to manage your issues
          </p>
        </div>
        <div id="login-body" class="w-full">
          <fieldset class="fieldset">
            <div class="space-y-1">
              <label class="label text-sm font-medium text-neutral"
                >Username</label
              >
              <input
                id="username"
                type="text"
                class="input w-full"
                placeholder="Enter your username"
              />
              <p class="text-xs text-primary">Default: admin</p>
            </div>
            <div class="space-y-1">
              <label class="label text-sm font-medium text-neutral"
                >Password</label
              >
              <input
                id="password"
                type="password"
                class="input w-full"
                placeholder="Enter your password"
              />
              <p class="text-xs text-primary">Default: admin123</p>
            </div>
            <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
          </fieldset>
        </div>
        <div id="login-footer" class="w-full flex flex-col gap-2">
          <div class="flex items-center gap-2 w-full">
            <div class="flex-1 h-px bg-gray-400"></div>
            <p class="text-xs font-medium">OR</p>
            <div class="flex-1 h-px bg-gray-400"></div>
          </div>
          <p class="text-xs text-center font-light text-base-content/60">
            Demo Credentials:
          </p>
          <div class="flex flex-col gap-1 w-full bg-base-200 p-9 rounded-lg">
            <p class="text-xs text-center font-normal">
              <strong>Username</strong>: admin
            </p>
            <p class="text-xs text-center font-normal">
              <strong>Password</strong>: admin123
            </p>
          </div>
        </div>
      </div>
    </section>
    <section id="main-page" class="hidden">
      <header class="bg-base-100">
        <div
          class="navbar w-fit md:w-full shadow-sm mx-auto md:px-8 items-center flex-col gap-2 md:flex-row"
        >
          <div class="flex-1 flex items-center">
            <img class="h-9" src="./assets/github-logo.png" alt="github-logo" />
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
          </div>
          <div class="flex-1 flex items-center gap-2 md:justify-end">
            <input
              type="text"
              placeholder="Search"
              class="input input-bordered w-full md:w-auto"
            />
            <button class="btn btn-primary md:flex gap-1">
              <i class="fa-solid fa-search"></i
              ><span class="hidden md:block">Search Issue</span>
            </button>
            <button class="btn btn-primary md:flex gap-1">
              <i class="fa-solid fa-plus"></i
              ><span class="hidden md:block">Add Issue</span>
            </button>
          </div>
        </div>
      </header>
      <section id="tabs-section">
        <div class="tabs tabs-box">
          <input
            id="all-tab"
            type="radio"
            name="tab"
            class="tab"
            aria-label="All"
            checked="checked"
          />
          <div
            id="all-section"
            class="tab-content bg-base-100 border-base-300 p-6"
          >
            <div>
              <div
                id="all-issues-header"
                class="flex justify-between border-b border-b-gray-300 pb-4"
              >
                <!-- section header with stat will be inserted here by JavaScript -->
              </div>
              <div
                id="all-issues-container"
                class="bg-base-200 grid grid-cols-4 gap-4 p-1"
              >
                <!-- Issue cards will be inserted here by JavaScript -->
              </div>
            </div>
          </div>

          <input
            id="open-tab"
            type="radio"
            name="tab"
            class="tab"
            aria-label="Open"
          />
          <div
            id="open-section"
            class="tab-content bg-base-100 border-base-300 p-6"
          >
            <div
              id="open-issues-header"
              class="flex justify-between border-b border-b-gray-300 pb-4"
            >
              <!-- section header with stat will be inserted here by JavaScript -->
            </div>
            <div
              id="open-issues-container"
              class="bg-base-200 grid grid-cols-4 gap-4 p-1"
            >
              <!-- Issue cards will be inserted here by JavaScript -->
            </div>
          </div>

          <input
            id="closed-tab"
            type="radio"
            name="tab"
            class="tab"
            aria-label="Closed"
          />
          <div
            id="closed-section"
            class="tab-content bg-base-100 border-base-300 p-6"
          >
            <div
              id="closed-issues-header"
              class="flex justify-between border-b border-b-gray-300 pb-4"
            >
              <!-- section header with stat will be inserted here by JavaScript -->
            </div>
            <div
              id="closed-issues-container"
              class="bg-base-200 grid grid-cols-4 gap-4 p-1"
            >
              <!-- Issue cards will be inserted here by JavaScript -->
            </div>
          </div>
        </div>
      </section>
    </section>
    <script src="./scripts/login.js"></script>
    <script src="./scripts/script.js"></script>
  </body>
</html>
